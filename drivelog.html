<!DOCTYPE html>
<html lang="en" id="html-root">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>DriveLog — Permit Tracker</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    /* ── CSS Variables (light + dark) ── */
    :root {
      --blue: #2563eb; --blue-dk: #1d4ed8; --blue-lt: #dbeafe;
      --green: #16a34a; --green-lt: #dcfce7;
      --purple: #7c3aed; --purple-lt: #ede9fe;
      --amber: #d97706; --amber-lt: #fef3c7;
      --red: #dc2626; --red-lt: #fee2e2;
      --bg: #f1f5f9; --card: #ffffff;
      --text: #0f172a; --muted: #64748b; --border: #e2e8f0;
      --input-bg: #ffffff;
      --radius: 14px; --shadow: 0 1px 4px rgba(0,0,0,.08), 0 4px 16px rgba(0,0,0,.06);
      --nav-h: 60px;
    }
    [data-dark] {
      --bg: #0f172a; --card: #1e293b;
      --text: #f1f5f9; --muted: #94a3b8; --border: #334155;
      --input-bg: #1e293b;
      --blue-lt: #1e3a5f; --green-lt: #14532d; --purple-lt: #3b0764;
      --amber-lt: #451a03; --red-lt: #450a0a;
      --shadow: 0 1px 4px rgba(0,0,0,.3), 0 4px 16px rgba(0,0,0,.25);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); }
    body { display: flex; flex-direction: column; overflow: hidden; transition: background .2s, color .2s; }

    /* ── Header ── */
    #header { background: var(--card); border-bottom: 1px solid var(--border); padding: 14px 20px 10px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
    #header h1 { font-size: 1.1rem; font-weight: 700; letter-spacing: -.3px; }
    #header h1 span { color: var(--blue); }
    #live-badge { display: none; background: var(--red); color: #fff; font-size: .65rem; font-weight: 700; padding: 2px 7px; border-radius: 99px; letter-spacing: .5px; animation: pulse 1.4s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }

    /* ── Bottom Nav (5 tabs) ── */
    #nav { display: flex; background: var(--card); border-top: 1px solid var(--border); flex-shrink: 0; }
    .nav-btn { flex: 1; border: none; background: none; cursor: pointer; padding: 6px 2px 8px; display: flex; flex-direction: column; align-items: center; gap: 3px; color: var(--muted); transition: color .15s; font-size: .58rem; font-weight: 600; letter-spacing: .2px; text-transform: uppercase; }
    .nav-btn .icon { font-size: 1.3rem; line-height: 1; }
    .nav-btn.active { color: var(--blue); }
    .nav-btn.drive-btn.recording { color: var(--red); }

    /* ── Main ── */
    #main { flex: 1; position: relative; overflow: hidden; }
    .view { display: none; position: absolute; inset: 0; overflow-y: auto; overflow-x: hidden; }
    .view.active { display: block; }
    #drive-view.active { display: flex; overflow: hidden; }
    .padded { padding: 16px; }
    .section-title { font-size: .7rem; font-weight: 700; text-transform: uppercase; letter-spacing: .8px; color: var(--muted); margin: 18px 0 8px; }
    .card { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); padding: 16px; margin-bottom: 12px; }

    /* ── Dashboard ── */
    .stats-hero { display: flex; align-items: center; gap: 20px; }
    .ring-wrap { position: relative; flex-shrink: 0; }
    .ring-wrap .ring-label { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .ring-wrap .ring-pct { font-size: 1.4rem; font-weight: 800; line-height: 1; }
    .ring-wrap .ring-sub { font-size: .65rem; color: var(--muted); margin-top: 2px; }
    .hero-right { flex: 1; }
    .hero-right h2 { font-size: 1.3rem; font-weight: 800; }
    .hero-right .sub { font-size: .8rem; color: var(--muted); margin-top: 2px; }
    .mini-bar-wrap { margin-top: 12px; }
    .mini-bar-label { display: flex; justify-content: space-between; font-size: .72rem; margin-bottom: 4px; }
    .mini-bar-track { height: 8px; background: var(--border); border-radius: 99px; overflow: hidden; }
    .mini-bar-fill { height: 100%; border-radius: 99px; transition: width .5s; }
    .stat-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
    .stat-box { text-align: center; }
    .stat-box .val { font-size: 1.25rem; font-weight: 800; }
    .stat-box .lbl { font-size: .65rem; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }
    .session-row { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--border); cursor: pointer; }
    .session-row:last-child { border-bottom: none; padding-bottom: 0; }
    .session-row .s-icon { width: 38px; height: 38px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; flex-shrink: 0; }
    .s-day { background: var(--amber-lt); }
    .s-night { background: var(--purple-lt); }
    .session-row .s-info { flex: 1; min-width: 0; }
    .session-row .s-title { font-weight: 600; font-size: .88rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .session-row .s-meta { font-size: .72rem; color: var(--muted); margin-top: 2px; }
    .session-row .s-dur { font-size: .85rem; font-weight: 700; color: var(--blue); flex-shrink: 0; }
    .empty-state { text-align: center; padding: 40px 20px; color: var(--muted); }
    .empty-state .e-icon { font-size: 2.5rem; margin-bottom: 10px; }
    .start-fab { display: block; width: 100%; background: var(--blue); color: #fff; border: none; border-radius: var(--radius); padding: 15px; font-size: 1rem; font-weight: 700; cursor: pointer; text-align: center; margin-bottom: 12px; }
    .start-fab:active { background: var(--blue-dk); }

    /* ── Milestone badges ── */
    .milestone-badges { display: flex; flex-wrap: wrap; gap: 10px; }
    .milestone-badge { display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 10px 14px; border-radius: var(--radius); border: 2px solid var(--border); background: var(--card); min-width: 70px; text-align: center; }
    .milestone-badge.earned { border-color: var(--green); background: var(--green-lt); }
    .milestone-badge.locked { opacity: .5; }
    .milestone-badge .mb-icon { font-size: 1.6rem; }
    .milestone-badge .mb-label { font-size: .62rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .3px; }
    .milestone-badge.earned .mb-label { color: var(--green); }

    /* ── Weekly Chart ── */
    .chart-svg text { fill: var(--muted); }
    .chart-legend { display: flex; gap: 16px; justify-content: center; margin-top: 8px; font-size: .72rem; color: var(--muted); align-items: center; }
    .legend-swatch { width: 12px; height: 12px; border-radius: 3px; display: inline-block; }

    /* ── Drive View ── */
    #drive-view { flex-direction: column; }
    #drive-map { flex: 1; min-height: 0; z-index: 0; }
    #drive-panel { background: var(--card); border-top: 1px solid var(--border); padding: 14px 16px 16px; flex-shrink: 0; z-index: 10; max-height: 55vh; overflow-y: auto; }
    #drive-pre { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; padding: 40px 20px; text-align: center; }
    #drive-pre h2 { font-size: 1.5rem; font-weight: 800; margin-bottom: 8px; }
    #drive-pre p { color: var(--muted); font-size: .88rem; margin-bottom: 28px; line-height: 1.5; }
    .btn-big { width: 100%; padding: 17px; font-size: 1.05rem; font-weight: 700; border: none; border-radius: var(--radius); cursor: pointer; }
    .btn-start { background: var(--green); color: #fff; }
    .btn-stop { background: var(--red); color: #fff; }
    .btn-big:active { opacity: .85; }
    .drive-stats { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 10px; margin-bottom: 14px; }
    .ds-box { text-align: center; }
    .ds-box .dv { font-size: 1.1rem; font-weight: 800; }
    .ds-box .dl { font-size: .6rem; text-transform: uppercase; color: var(--muted); letter-spacing: .4px; }
    .drive-meta { display: flex; gap: 8px; align-items: center; font-size: .78rem; color: var(--muted); margin-bottom: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .drive-meta span { overflow: hidden; text-overflow: ellipsis; }
    .badge { display: inline-flex; align-items: center; gap: 4px; background: var(--blue-lt); color: var(--blue); font-size: .65rem; font-weight: 700; padding: 3px 8px; border-radius: 99px; letter-spacing: .3px; flex-shrink: 0; }
    .badge.night { background: var(--purple-lt); color: var(--purple); }
    .badge.day { background: var(--amber-lt); color: var(--amber); }
    #locate-btn { background: none; border: 1px solid var(--border); border-radius: 8px; padding: 6px 12px; font-size: .78rem; cursor: pointer; color: var(--muted); margin-bottom: 14px; }

    /* ── Wrap-up panel ── */
    .wrapup-title { font-size: 1rem; font-weight: 800; margin-bottom: 14px; }
    .wrapup-summary { display: flex; gap: 12px; margin-bottom: 16px; }
    .wrapup-stat { flex: 1; text-align: center; background: var(--bg); border-radius: 10px; padding: 10px 6px; }
    .wrapup-stat .ws-val { font-size: 1.2rem; font-weight: 800; }
    .wrapup-stat .ws-lbl { font-size: .6rem; text-transform: uppercase; color: var(--muted); letter-spacing: .4px; }

    /* ── Skills View ── */
    #skills-view { }
    .skill-progress-bar { height: 8px; background: var(--border); border-radius: 99px; overflow: hidden; margin-bottom: 4px; }
    .skill-progress-fill { height: 100%; border-radius: 99px; background: var(--blue); transition: width .4s; }
    .skill-progress-label { display: flex; justify-content: space-between; font-size: .72rem; color: var(--muted); margin-bottom: 14px; }
    .skill-cat-title { font-size: .7rem; font-weight: 700; text-transform: uppercase; letter-spacing: .8px; color: var(--muted); margin: 16px 0 8px; }
    .skill-row { display: flex; align-items: center; gap: 10px; padding: 9px 0; border-bottom: 1px solid var(--border); }
    .skill-row:last-child { border-bottom: none; }
    .skill-name { flex: 1; font-size: .88rem; font-weight: 500; }
    .skill-btns { display: flex; gap: 5px; }
    .skill-btn { border: 1.5px solid var(--border); background: var(--card); color: var(--muted); border-radius: 8px; padding: 4px 9px; font-size: .7rem; font-weight: 600; cursor: pointer; transition: all .15s; }
    .skill-btn.active-practiced { border-color: var(--amber); background: var(--amber-lt); color: var(--amber); }
    .skill-btn.active-mastered { border-color: var(--green); background: var(--green-lt); color: var(--green); }

    /* ── History ── */
    .filter-bar { display: flex; gap: 8px; margin-bottom: 14px; overflow-x: auto; padding-bottom: 2px; }
    .filter-chip { border: 1px solid var(--border); background: var(--card); border-radius: 99px; padding: 5px 13px; font-size: .75rem; cursor: pointer; white-space: nowrap; flex-shrink: 0; font-weight: 500; color: var(--text); }
    .filter-chip.active { background: var(--blue); color: #fff; border-color: var(--blue); }

    /* ── Settings ── */
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: .78rem; font-weight: 600; margin-bottom: 6px; color: var(--muted); text-transform: uppercase; letter-spacing: .4px; }
    .form-group input, .form-group select { width: 100%; border: 1.5px solid var(--border); border-radius: 10px; padding: 11px 14px; font-size: .92rem; background: var(--input-bg); color: var(--text); outline: none; }
    .form-group input:focus, .form-group select:focus { border-color: var(--blue); }
    .req-display { display: flex; gap: 10px; margin-top: 8px; }
    .req-box { flex: 1; background: var(--blue-lt); border-radius: 10px; padding: 10px; text-align: center; }
    .req-box .rv { font-size: 1.4rem; font-weight: 800; color: var(--blue); }
    .req-box .rl { font-size: .65rem; color: var(--blue); text-transform: uppercase; letter-spacing: .4px; margin-top: 2px; }
    .req-box.night { background: var(--purple-lt); }
    .req-box.night .rv, .req-box.night .rl { color: var(--purple); }
    .note-box { background: var(--amber-lt); border-radius: 10px; padding: 10px 12px; font-size: .78rem; color: var(--amber); margin-top: 8px; line-height: 1.5; }
    .btn-row { display: flex; gap: 10px; }
    .btn-outline { flex: 1; border: 1.5px solid var(--border); background: var(--card); border-radius: 10px; padding: 12px; font-size: .88rem; font-weight: 600; cursor: pointer; color: var(--text); }
    .btn-outline:hover { border-color: var(--blue); color: var(--blue); }
    .btn-danger { flex: 1; border: 1.5px solid var(--red); background: var(--card); border-radius: 10px; padding: 12px; font-size: .88rem; font-weight: 600; cursor: pointer; color: var(--red); }
    .btn-save { width: 100%; background: var(--blue); color: #fff; border: none; border-radius: 10px; padding: 14px; font-size: .95rem; font-weight: 700; cursor: pointer; margin-top: 8px; }
    .toggle-row { display: flex; align-items: center; justify-content: space-between; padding: 6px 0; }
    .toggle-row label { font-size: .88rem; font-weight: 500; color: var(--text); }
    .toggle { position: relative; width: 46px; height: 26px; flex-shrink: 0; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle-slider { position: absolute; inset: 0; background: var(--border); border-radius: 99px; cursor: pointer; transition: background .2s; }
    .toggle-slider::before { content: ''; position: absolute; height: 20px; width: 20px; left: 3px; top: 3px; background: #fff; border-radius: 50%; transition: transform .2s; }
    .toggle input:checked + .toggle-slider { background: var(--blue); }
    .toggle input:checked + .toggle-slider::before { transform: translateX(20px); }

    /* ── Modal ── */
    #modal, #manual-modal { display: none; position: fixed; inset: 0; z-index: 1000; background: rgba(0,0,0,.45); overflow-y: auto; }
    #modal.open, #manual-modal.open { display: block; }
    .modal-card { background: var(--card); margin: 20px 14px 30px; border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; }
    .modal-header { padding: 14px 16px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); }
    .modal-header h3 { font-size: 1rem; font-weight: 700; }
    .close-btn { background: none; border: none; font-size: 1.3rem; cursor: pointer; color: var(--muted); padding: 4px; line-height: 1; }
    #detail-map { height: 220px; }
    .modal-body { padding: 16px; }
    .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .detail-item .di-label { font-size: .65rem; text-transform: uppercase; letter-spacing: .5px; color: var(--muted); font-weight: 600; margin-bottom: 2px; }
    .detail-item .di-val { font-size: .9rem; font-weight: 600; }
    .notes-label { font-size: .78rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .4px; margin: 14px 0 6px; }
    #detail-notes { width: 100%; border: 1.5px solid var(--border); border-radius: 10px; padding: 10px 12px; font-size: .88rem; min-height: 70px; resize: vertical; font-family: inherit; outline: none; background: var(--input-bg); color: var(--text); }
    #detail-notes:focus { border-color: var(--blue); }
    .modal-actions { padding: 12px 16px 16px; display: flex; gap: 10px; border-top: 1px solid var(--border); }
    .btn-del { flex: 1; border: 1.5px solid var(--red); color: var(--red); background: none; border-radius: 10px; padding: 11px; font-weight: 600; cursor: pointer; }
    .btn-save-notes { flex: 2; background: var(--blue); color: #fff; border: none; border-radius: 10px; padding: 11px; font-weight: 600; cursor: pointer; }

    /* ── Misc ── */
    .chip { display: inline-flex; align-items: center; gap: 4px; background: var(--blue-lt); color: var(--blue); font-size: .65rem; font-weight: 700; padding: 2px 8px; border-radius: 99px; }
    .chip.night { background: var(--purple-lt); color: var(--purple); }
    .toast { position: fixed; bottom: calc(var(--nav-h) + 14px); left: 50%; transform: translateX(-50%); background: #0f172a; color: #fff; padding: 10px 18px; border-radius: 99px; font-size: .82rem; font-weight: 500; z-index: 9999; opacity: 0; transition: opacity .25s; pointer-events: none; white-space: nowrap; }
    .toast.show { opacity: 1; }
    .leaflet-control-attribution { font-size: 9px !important; }
    textarea.modal-input { width: 100%; border: 1.5px solid var(--border); border-radius: 10px; padding: 10px 12px; font-size: .88rem; min-height: 60px; resize: vertical; font-family: inherit; outline: none; background: var(--input-bg); color: var(--text); }
    .inline-input { width: 100%; border: 1.5px solid var(--border); border-radius: 10px; padding: 11px 14px; font-size: .92rem; outline: none; background: var(--input-bg); color: var(--text); }
    .inline-input:focus { border-color: var(--blue); }
    select.inline-input { appearance: auto; }
    @media (max-width: 400px) { .drive-stats { grid-template-columns: 1fr 1fr; } }
  </style>
</head>
<body>

<div id="header">
  <h1>Drive<span>Log</span></h1>
  <span id="live-badge">● REC</span>
</div>

<div id="main">
  <!-- Dashboard -->
  <div id="dashboard-view" class="view padded">
    <div id="dash-content"></div>
  </div>

  <!-- Drive -->
  <div id="drive-view" class="view">
    <div id="drive-map"></div>
    <div id="drive-panel"></div>
  </div>

  <!-- Skills -->
  <div id="skills-view" class="view padded">
    <div id="skills-content"></div>
  </div>

  <!-- History -->
  <div id="history-view" class="view padded">
    <div id="history-content"></div>
  </div>

  <!-- Settings -->
  <div id="settings-view" class="view padded">
    <div id="settings-content"></div>
  </div>
</div>

<nav id="nav">
  <button class="nav-btn active" data-view="dashboard">
    <span class="icon">📊</span>Progress
  </button>
  <button class="nav-btn drive-btn" data-view="drive">
    <span class="icon">🚗</span>Drive
  </button>
  <button class="nav-btn" data-view="skills">
    <span class="icon">✅</span>Skills
  </button>
  <button class="nav-btn" data-view="history">
    <span class="icon">📋</span>History
  </button>
  <button class="nav-btn" data-view="settings">
    <span class="icon">⚙️</span>Settings
  </button>
</nav>

<!-- Session Detail Modal -->
<div id="modal">
  <div class="modal-card">
    <div class="modal-header">
      <h3 id="modal-title">Session Detail</h3>
      <button class="close-btn" onclick="closeModal()">✕</button>
    </div>
    <div id="detail-map"></div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-actions">
      <button class="btn-del" id="modal-del-btn">Delete</button>
      <button class="btn-outline" id="modal-edit-btn" style="flex:1">Edit</button>
      <button class="btn-save-notes" id="modal-save-btn">Save Notes</button>
    </div>
  </div>
</div>

<!-- Manual Entry Modal -->
<div id="manual-modal">
  <div class="modal-card">
    <div class="modal-header">
      <h3 id="manual-modal-title">Add Drive Manually</h3>
      <button class="close-btn" onclick="closeManualModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>Date</label>
        <input type="date" id="m-date" class="inline-input">
      </div>
      <div style="display:flex;gap:10px">
        <div class="form-group" style="flex:1">
          <label>Start Time</label>
          <input type="time" id="m-start" class="inline-input">
        </div>
        <div class="form-group" style="flex:1">
          <label>End Time</label>
          <input type="time" id="m-end" class="inline-input">
        </div>
      </div>
      <div class="form-group">
        <label>Or enter duration directly</label>
        <div style="display:flex;gap:10px">
          <input type="number" id="m-dur-h" min="0" max="23" placeholder="Hours" class="inline-input" style="flex:1">
          <input type="number" id="m-dur-m" min="0" max="59" placeholder="Minutes" class="inline-input" style="flex:1">
        </div>
      </div>
      <div class="form-group">
        <label>Conditions</label>
        <select id="m-daynight" class="inline-input">
          <option value="day">☀️ Day</option>
          <option value="night">🌙 Night</option>
        </select>
      </div>
      <div class="form-group">
        <label>Supervisor Name (optional)</label>
        <input type="text" id="m-supervisor" placeholder="e.g. Jane Smith" class="inline-input">
      </div>
      <div class="form-group">
        <label>Supervisor License # (optional)</label>
        <input type="text" id="m-supervisor-lic" placeholder="License number" class="inline-input">
      </div>
      <div class="form-group">
        <label>Location (optional)</label>
        <input type="text" id="m-location" placeholder="e.g. Springfield, IL" class="inline-input">
      </div>
      <div class="form-group">
        <label>Notes (optional)</label>
        <textarea id="m-notes" placeholder="Add notes…" class="modal-input"></textarea>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-save-notes" style="flex:1" onclick="saveManualDrive()">Save Drive</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
'use strict';

// ═══════════════════════════════════════════════════════
// STATE REQUIREMENTS (source: IIHS + individual state DMVs)
// ═══════════════════════════════════════════════════════
const STATE_REQS = {
  "AL":{ name:"Alabama",           total:50,  night:10 },
  "AK":{ name:"Alaska",            total:40,  night:10,  note:"10 hrs must be at night or in inclement weather" },

function getReqs() {
  const st = STATE_REQS[settings.state] || STATE_REQS['CA'];
  return {
    total: settings.customTotal != null ? +settings.customTotal : st.total,
    night: settings.customNight != null ? +settings.customNight : st.night,
    note: st.note || null,
    stateName: st.name
  };
}

function getTotals() {
  let totalMin = 0, nightMin = 0, distMi = 0;
  for (const s of sessions) {
    totalMin += s.duration || 0;
    if (s.isNight) nightMin += s.duration || 0;
    distMi += s.distance || 0;
  }
  return { totalHours: totalMin / 60, nightHours: nightMin / 60, sessions: sessions.length, distMi };
}

// ═══════════════════════════════════════════════════════
// MILESTONES
// ═══════════════════════════════════════════════════════
function checkMilestones() {
  const totals = getTotals();
  const reqs = getReqs();
  if (!settings.milestonesUnlocked) settings.milestonesUnlocked = [];
  let changed = false;
  for (const m of MILESTONES) {
    if (!settings.milestonesUnlocked.includes(m.id) && m.check(totals, reqs)) {
      settings.milestonesUnlocked.push(m.id);
      changed = true;
      setTimeout(() => toast(m.icon + ' Milestone unlocked: ' + m.label), 400);
    }
  }
  if (changed) saveSettings();
}

function milestonesHTML(totals, reqs) {
  if (!settings.milestonesUnlocked) settings.milestonesUnlocked = [];
  const badges = MILESTONES.map(m => {
    const earned = settings.milestonesUnlocked.includes(m.id);
    return `<div class="milestone-badge ${earned ? 'earned' : 'locked'}">
      <div class="mb-icon">${m.icon}</div>
      <div class="mb-label">${m.label}</div>
    </div>`;
  }).join('');
  return `<div class="section-title">Milestones</div>
  <div class="card"><div class="milestone-badges">${badges}</div></div>`;
}

// ═══════════════════════════════════════════════════════
// WEEKLY CHART
// ═══════════════════════════════════════════════════════
function weeklyChartHTML() {
  // Build 8-week buckets ending this week
  const now = new Date();
  const dayOfWeek = now.getDay(); // 0=Sun
  const weekStart = new Date(now); weekStart.setHours(0,0,0,0);
  weekStart.setDate(weekStart.getDate() - dayOfWeek);

  const weeks = [];
  for (let i = 7; i >= 0; i--) {
    const ws = new Date(weekStart); ws.setDate(ws.getDate() - i * 7);
    const we = new Date(ws); we.setDate(we.getDate() + 7);
    weeks.push({ start: ws, end: we, dayMin: 0, nightMin: 0 });
  }

  for (const s of sessions) {
    const t = new Date(s.startTime).getTime();
    for (const w of weeks) {
      if (t >= w.start.getTime() && t < w.end.getTime()) {
        if (s.isNight) w.nightMin += s.duration || 0;
        else w.dayMin += s.duration || 0;
        break;
      }
    }
  }

  const toH = m => m / 60;
  const maxH = Math.max(...weeks.map(w => toH(w.dayMin + w.nightMin)), 0.5);

  // SVG dimensions
  const vW = 340, vH = 130;
  const padL = 28, padR = 4, padT = 14, padB = 28;
  const chartW = vW - padL - padR;
  const chartH = vH - padT - padB;
  const barW = chartW / 8;

  // Nice Y interval
  const niceMax = Math.ceil(maxH / 1) * 1 || 1;
  const yStep = niceMax <= 4 ? 1 : niceMax <= 8 ? 2 : 5;

  let gridLines = '';
  let yLabels = '';
  for (let h = 0; h <= niceMax; h += yStep) {
    const y = padT + chartH - (h / niceMax) * chartH;
    gridLines += `<line x1="${padL}" y1="${y.toFixed(1)}" x2="${vW - padR}" y2="${y.toFixed(1)}" stroke="var(--border)" stroke-width="1"/>`;
    yLabels += `<text x="${padL - 3}" y="${(y + 4).toFixed(1)}" text-anchor="end" font-size="8">${h}</text>`;
  }

  let bars = '';
  let xLabels = '';
  weeks.forEach((w, i) => {
    const x = padL + i * barW;
    const bx = x + barW * 0.15;
    const bw = barW * 0.7;
    const dayH = (toH(w.dayMin) / niceMax) * chartH;
    const nightH = (toH(w.nightMin) / niceMax) * chartH;
    const totalH = dayH + nightH;
    const barY = padT + chartH - totalH;

    if (nightH > 0) {
      bars += `<rect x="${bx.toFixed(1)}" y="${(padT + chartH - nightH).toFixed(1)}" width="${bw.toFixed(1)}" height="${nightH.toFixed(1)}" rx="2" fill="#7c3aed"/>`;
    }
    if (dayH > 0) {
      const dy = padT + chartH - totalH;
      bars += `<rect x="${bx.toFixed(1)}" y="${dy.toFixed(1)}" width="${bw.toFixed(1)}" height="${dayH.toFixed(1)}" rx="2" fill="#d97706"/>`;
    }
    if (totalH > 4) {
      const totalHrs = toH(w.dayMin + w.nightMin);
      bars += `<text x="${(bx + bw/2).toFixed(1)}" y="${(barY - 2).toFixed(1)}" text-anchor="middle" font-size="7" fill="var(--muted)">${totalHrs.toFixed(1)}</text>`;
    }

    // X label: short date (M/D)
    const lbl = `${w.start.getMonth()+1}/${w.start.getDate()}`;
    xLabels += `<text x="${(x + barW/2).toFixed(1)}" y="${(vH - 4).toFixed(1)}" text-anchor="middle" font-size="7">${lbl}</text>`;
  });

  const svg = `<svg viewBox="0 0 ${vW} ${vH}" class="chart-svg" style="width:100%;height:auto;display:block">
    ${gridLines}
    ${yLabels}
    ${bars}
    ${xLabels}
  </svg>`;

  const legend = `<div class="chart-legend">
    <span><span class="legend-swatch" style="background:#d97706"></span> Day</span>
    <span><span class="legend-swatch" style="background:#7c3aed"></span> Night</span>
  </div>`;

  return `<div class="section-title">Weekly Summary</div>
  <div class="card">${svg}${legend}</div>`;
}

function navigate(view) {
  currentView = view;
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.view === view);
  });
  document.getElementById(view + '-view').classList.add('active');
  if (view === 'dashboard') renderDashboard();
  else if (view === 'drive') renderDrive();
  else if (view === 'skills') renderSkills();
  else if (view === 'history') renderHistory();
  else if (view === 'settings') renderSettings();
}

function goalCard(reqs, totals) {
  if (!settings.goalDate) return '';

  const today = new Date(); today.setHours(0,0,0,0);
  const goal = new Date(settings.goalDate + 'T00:00:00');
  const daysLeft = Math.ceil((goal - today) / 86400000);

  if (daysLeft <= 0) {
    const hoursLeft = Math.max(reqs.total - totals.totalHours, 0);
    const nightLeft = Math.max(reqs.night - totals.nightHours, 0);
    if (hoursLeft === 0 && nightLeft === 0) {
      return `<div class="card" style="background:var(--green-lt);border:1.5px solid var(--green)">
        <div style="font-weight:700;color:var(--green);font-size:1rem">🎉 Goal date reached — requirements met!</div>
      </div>`;
    }
    return `<div class="card" style="background:var(--red-lt);border:1.5px solid var(--red)">
      <div style="font-weight:700;color:var(--red);margin-bottom:4px">⚠️ Goal date passed</div>
      <div style="font-size:.82rem;color:var(--red)">${hoursLeft.toFixed(1)} total hrs and ${nightLeft.toFixed(1)} night hrs still needed.</div>
    </div>`;
  }

  const weeksLeft = daysLeft / 7;
  const hoursLeft = Math.max(reqs.total - totals.totalHours, 0);
  const nightLeft = Math.max(reqs.night - totals.nightHours, 0);
  const hrsPerWeek = hoursLeft / weeksLeft;
  const nightPerWeek = nightLeft / weeksLeft;
  const onTrack = reqs.total === 0 || hrsPerWeek <= 5;
  const accent = onTrack ? 'var(--green)' : 'var(--amber)';
  const accentLt = onTrack ? 'var(--green-lt)' : 'var(--amber-lt)';

  const daysLabel = daysLeft === 1 ? '1 day' : daysLeft < 14 ? `${daysLeft} days` : `${Math.round(weeksLeft)} weeks`;
  const goalFmt = goal.toLocaleDateString([], { month: 'short', day: 'numeric', year: 'numeric' });

  if (hoursLeft === 0 && nightLeft === 0) {
    return `<div class="card" style="background:var(--green-lt);border:1.5px solid var(--green)">
      <div style="font-weight:700;color:var(--green)">✅ All hours complete! ${daysLabel} until ${goalFmt}.</div>
    </div>`;
  }

  return `<div class="card" style="background:${accentLt};border:1.5px solid ${accent}">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
      <div>
        <div style="font-weight:700;font-size:.92rem;color:${accent}">📅 Goal: ${goalFmt}</div>
        <div style="font-size:.75rem;color:var(--muted);margin-top:2px">${daysLabel} remaining</div>
      </div>
      <div style="text-align:right">
        <div style="font-size:1.6rem;font-weight:800;color:${accent};line-height:1">${hrsPerWeek.toFixed(1)}</div>
        <div style="font-size:.65rem;text-transform:uppercase;letter-spacing:.4px;color:var(--muted)">hrs/week</div>
      </div>
    </div>
    <div style="display:flex;gap:16px;font-size:.78rem">
      <span>⏱ ${hoursLeft.toFixed(1)} total hrs left</span>
      ${reqs.night > 0 ? `<span>🌙 ${nightLeft.toFixed(1)} night hrs left · ${nightPerWeek.toFixed(1)}/wk</span>` : ''}
    </div>
  </div>`;
}

  `;
  document.querySelectorAll('.session-row').forEach(r => {
    r.addEventListener('click', () => showSessionDetail(r.dataset.id));
  });
}

function sessionRow(s) {
  const addr = s.startLocation?.city || s.startLocation?.address || 'Unknown location';
  return `<div class="session-row" data-id="${s.id}">
    <div class="s-icon ${s.isNight ? 's-night' : 's-day'}">${s.isNight ? '🌙' : '☀️'}</div>
    <div class="s-info">
      <div class="s-title">${addr}</div>
      <div class="s-meta">${fmtDate(s.startTime)} · ${fmtTime(s.startTime)} · ${s.weather ? wxEmoji(s.weather.code) + ' ' + s.weather.temp + '°F' : ''}</div>
    </div>
    <div class="s-dur">${fmtDur(s.duration)}</div>
  </div>`;
}

function progressRing(pct, color, size=110, stroke=11) {
  const r = (size - stroke) / 2;
  const circ = 2 * Math.PI * r;
  const offset = circ * (1 - pct);
  return `<svg width="${size}" height="${size}" style="transform:rotate(-90deg)">
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="var(--border)" stroke-width="${stroke}"/>
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${color}" stroke-width="${stroke}"
      stroke-dasharray="${circ.toFixed(2)}" stroke-dashoffset="${offset.toFixed(2)}"
      stroke-linecap="round"/>
  </svg>`;
}

// ═══════════════════════════════════════════════════════
// SKILLS VIEW
// ═══════════════════════════════════════════════════════
function renderSkills() {
  const total = SKILLS.length;
  const practiced = SKILLS.filter(s => skills[s.id] === 1).length;
  const mastered = SKILLS.filter(s => skills[s.id] === 2).length;
  const done = practiced + mastered;
  const pct = Math.round((mastered / total) * 100);

  // Group by category
  const cats = {};
  for (const sk of SKILLS) {
    if (!cats[sk.cat]) cats[sk.cat] = [];
    cats[sk.cat].push(sk);
  }

  let catsHTML = '';
  for (const [cat, skList] of Object.entries(cats)) {
    const rows = skList.map(sk => {
      const level = skills[sk.id] || 0;
      return `<div class="skill-row">
        <div class="skill-name">${sk.name}</div>
        <div class="skill-btns">
          <button class="skill-btn ${level === 0 ? '' : ''}" onclick="setSkill('${sk.id}', ${level === 0 ? 1 : 0})" title="Not started">—</button>
          <button class="skill-btn ${level === 1 ? 'active-practiced' : ''}" onclick="setSkill('${sk.id}', ${level === 1 ? 0 : 1})" title="Practiced">Practiced</button>
          <button class="skill-btn ${level === 2 ? 'active-mastered' : ''}" onclick="setSkill('${sk.id}', ${level === 2 ? 0 : 2})" title="Mastered">Mastered</button>
        </div>
      </div>`;
    }).join('');
    catsHTML += `<div class="skill-cat-title">${cat}</div><div class="card" style="padding:0 16px">${rows}</div>`;
  }

  document.getElementById('skills-content').innerHTML = `
    <div class="section-title">Skills Checklist</div>
    <div class="card">
      <div class="skill-progress-label">
        <span>${mastered} mastered · ${practiced} practiced · ${total - done} not started</span>
        <span>${pct}% mastered</span>
      </div>
      <div class="skill-progress-bar"><div class="skill-progress-fill" style="width:${pct}%"></div></div>
    </div>
    ${catsHTML}
  `;
}

function initDriveMap() {
  driveMap = L.map('drive-map', { zoomControl: true, attributionControl: true });
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© <a href="https://openstreetmap.org">OSM</a>'
  }).addTo(driveMap);
  const session = activeSession || pendingSession;
  drivePolyline = L.polyline([], { color: '#2563eb', weight: 4, opacity: 0.85 }).addTo(driveMap);
  if (session && session.route.length > 0) {
    drivePolyline.setLatLngs(session.route);
    const last = session.route[session.route.length - 1];
    driveMap.setView(last, 15);
    if (drivePosMarker) drivePosMarker.remove();
    drivePosMarker = L.circleMarker(last, { radius: 8, color: '#fff', weight: 2, fillColor: '#2563eb', fillOpacity: 1 }).addTo(driveMap);
  } else {

function renderDrivePanel() {
  const s = activeSession;
  const dist = routeDistMiles(s.route);

  document.getElementById('drive-panel').innerHTML = `
    <div class="drive-stats">
      <div class="ds-box"><div class="dv" id="drive-timer">${fmtElapsed(s.startTime)}</div><div class="dl">Time</div></div>
      <div class="ds-box"><div class="dv">${dist.toFixed(2)}</div><div class="dl">Miles</div></div>
      <div class="ds-box"><div class="dv" id="drive-speed">${s.lastSpeed != null ? (s.lastSpeed * 2.23694).toFixed(0) : '—'}</div><div class="dl">MPH</div></div>
      <div class="ds-box"><div class="dv">${s.route.length}</div><div class="dl">Points</div></div>

    </div>
    <button class="btn-big btn-stop" onclick="stopDrive()">Stop Drive</button>`;
}

function startDrive() {
  activeSession = {
    id: genId(),
    startTime: new Date().toISOString(),
    endTime: null,
    duration: 0,
    isNight: isNightByTime(new Date()),
    startLocation: null,
    endLocation: null,
    weather: null,
    route: [],
    distance: 0,
    lastSpeed: null,
    speedSamples: [],
    maxSpeedMph: 0,
    avgSpeedMph: 0,
    notes: '',
    supervisorName: '',
    supervisorLic: ''
  };

  document.getElementById('live-badge').style.display = 'inline-block';
  document.querySelector('.drive-btn').classList.add('recording');
  navigate('drive');

  driveTimerInterval = setInterval(() => {
    const el = document.getElementById('drive-timer');
    if (el) el.textContent = fmtElapsed(activeSession.startTime);
  }, 1000);

  if (navigator.geolocation) {
    gpsWatchId = navigator.geolocation.watchPosition(
      pos => handleFirstFix(pos),
      err => console.warn('GPS:', err.message),
      { enableHighAccuracy: true, maximumAge: 5000, timeout: 10000 }
    );
  }
}

async function handleFirstFix(pos) {
  if (!activeSession) return;
  if (gpsWatchId != null) navigator.geolocation.clearWatch(gpsWatchId);
  const { latitude: lat, longitude: lng } = pos.coords;
  activeSession.route.push([lat, lng]);
  activeSession.lastSpeed = pos.coords.speed;
  if (pos.coords.speed != null) {
    const mph = pos.coords.speed * 2.23694;
    activeSession.speedSamples.push(mph);
  }

  const [wx, loc] = await Promise.all([fetchWeather(lat, lng), reverseGeocode(lat, lng)]);
  if (!activeSession) return;
  activeSession.weather = wx;
  activeSession.startLocation = loc;
  if (wx) activeSession.isNight = !wx.isDay;

  if (driveMap) {
    driveMap.setView([lat, lng], 15);
    if (drivePosMarker) drivePosMarker.remove();
    drivePosMarker = L.circleMarker([lat, lng], { radius: 8, color: '#fff', weight: 2, fillColor: '#2563eb', fillOpacity: 1 }).addTo(driveMap);
    drivePolyline.setLatLngs(activeSession.route);
  }
  if (currentView === 'drive') renderDrivePanel();

  gpsWatchId = navigator.geolocation.watchPosition(
    onPosition,
    err => console.warn('GPS:', err.message),
    { enableHighAccuracy: true, maximumAge: 5000, timeout: 10000 }
  );
}

function onPosition(pos) {
  if (!activeSession) return;
  const { latitude: lat, longitude: lng, speed } = pos.coords;
  activeSession.lastSpeed = speed;
  if (speed != null) {
    const mph = speed * 2.23694;
    activeSession.speedSamples.push(mph);
  }
  const route = activeSession.route;
  if (route.length > 0) {
    const last = route[route.length - 1];
    const d = haversineMeters(last[0], last[1], lat, lng);
    if (d < 5) return;
  }
  route.push([lat, lng]);
  if (drivePolyline) drivePolyline.setLatLngs(route);
  if (driveMap) {
    if (drivePosMarker) drivePosMarker.setLatLng([lat, lng]);
    else drivePosMarker = L.circleMarker([lat, lng], { radius: 8, color: '#fff', weight: 2, fillColor: '#2563eb', fillOpacity: 1 }).addTo(driveMap);
    driveMap.panTo([lat, lng], { animate: true, duration: 0.5 });
  }
  const distEl = document.querySelector('#drive-panel .drive-stats .ds-box:nth-child(2) .dv');
  if (distEl) distEl.textContent = routeDistMiles(route).toFixed(2);
  const ptEl = document.querySelector('#drive-panel .drive-stats .ds-box:nth-child(4) .dv');
  if (ptEl) ptEl.textContent = route.length;
  const spEl = document.getElementById('drive-speed');
  if (spEl) spEl.textContent = speed != null ? (speed * 2.23694).toFixed(0) : '—';
}

async function stopDrive() {
  if (!activeSession) return;
  if (gpsWatchId != null) { navigator.geolocation.clearWatch(gpsWatchId); gpsWatchId = null; }
  clearInterval(driveTimerInterval); driveTimerInterval = null;

  const now = new Date();
  activeSession.endTime = now.toISOString();
  activeSession.duration = elapsedMin(activeSession.startTime);
  activeSession.distance = routeDistMiles(activeSession.route);

  // Compute speed stats
  const samples = activeSession.speedSamples || [];
  if (samples.length > 0) {
    activeSession.maxSpeedMph = Math.round(Math.max(...samples));
    activeSession.avgSpeedMph = Math.round(samples.reduce((a, b) => a + b, 0) / samples.length);
  }

  // Get end location
  if (activeSession.route.length > 0) {
    const last = activeSession.route[activeSession.route.length - 1];
    activeSession.endLocation = await reverseGeocode(last[0], last[1]);
  }

  // Move to pending (wrap-up) state
  pendingSession = { ...activeSession };
  activeSession = null;

  if (currentView === 'drive') renderDrive();
}

function savePendingDrive() {
  if (!pendingSession) return;
  pendingSession.supervisorName = (document.getElementById('wu-supervisor')?.value || '').trim();
  pendingSession.supervisorLic = (document.getElementById('wu-supervisor-lic')?.value || '').trim();

  sessions.push({ ...pendingSession });
  saveSessions();
  checkMilestones();
  pendingSession = null;

  document.getElementById('live-badge').style.display = 'none';
  document.querySelector('.drive-btn').classList.remove('recording');
  if (driveMap) { driveMap.remove(); driveMap = null; drivePolyline = null; drivePosMarker = null; }

  toast('Drive saved!');
  navigate('dashboard');
}

function initDetailMap(s) {
  if (detailMap) { detailMap.remove(); detailMap = null; }
  if (!s.route || s.route.length < 2) {
    document.getElementById('detail-map').innerHTML = '<div style="height:220px;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:.85rem;background:var(--bg)">No route recorded</div>';
    return;
  }
  detailMap = L.map('detail-map', { zoomControl: false, attributionControl: false });
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(detailMap);
  const line = L.polyline(s.route, { color: '#2563eb', weight: 4, opacity: 0.85 }).addTo(detailMap);
  L.circleMarker(s.route[0], { radius: 8, color: '#fff', weight: 2, fillColor: '#16a34a', fillOpacity: 1 }).addTo(detailMap);
  L.circleMarker(s.route[s.route.length - 1], { radius: 8, color: '#fff', weight: 2, fillColor: '#dc2626', fillOpacity: 1 }).addTo(detailMap);
  detailMap.fitBounds(line.getBounds(), { padding: [20, 20] });
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  activeSessionId = null;
  if (detailMap) { detailMap.remove(); detailMap = null; }
}

function saveNotes(id) {
  const s = sessions.find(x => x.id === id);
  if (!s) return;
  s.notes = document.getElementById('detail-notes').value;
  saveSessions();
  toast('Notes saved');
  closeModal();
}

function deleteSession(id) {
  if (!confirm('Delete this session? This cannot be undone.')) return;
  sessions = sessions.filter(x => x.id !== id);
  saveSessions();
  toast('Session deleted');
  closeModal();
  if (currentView === 'history') renderHistory();
  else if (currentView === 'dashboard') renderDashboard();
}

document.getElementById('modal').addEventListener('click', e => {
  if (e.target === document.getElementById('modal')) closeModal();
});

// EXPORT & IMPORT
// ═══════════════════════════════════════════════════════
function exportJSON() {
  const data = { settings, sessions, skills, exported: new Date().toISOString(), version: 2 };
  download('drivelog.json', JSON.stringify(data, null, 2), 'application/json');
}

function exportCSV() {
  const rows = [['#','Date','Start','End','Duration (min)','Distance (mi)','D/N','Supervisor','License#','Location','Weather','Temp (F)','Wind (mph)','Max Speed (mph)','Avg Speed (mph)','Notes']];
  const sorted = [...sessions].sort((a,b) => new Date(a.startTime)-new Date(b.startTime));
  sorted.forEach((s, i) => {
    rows.push([
      i + 1,
      fmtDate(s.startTime),
      fmtTime(s.startTime),
      fmtTime(s.endTime),
      (s.duration||0).toFixed(1),
      (s.distance||0).toFixed(2),
      s.isNight ? 'Night' : 'Day',
      s.supervisorName || '',
      s.supervisorLic || '',
      s.startLocation?.city || s.startLocation?.address || '',
      s.weather ? (WX_DESC[s.weather.code]||'') : '',
      s.weather ? s.weather.temp : '',
      s.weather ? s.weather.windSpeed : '',
      s.maxSpeedMph || '',
      s.avgSpeedMph || '',
      (s.notes||'').replace(/,/g,'；').replace(/\n/g,' ')
    ]);
  });
  const csv = rows.map(r => r.map(c => `"${c}"`).join(',')).join('\n');
  download('drivelog.csv', csv, 'text/csv');
}

function importJSON(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.sessions) { toast('Invalid file'); return; }
      const replace = confirm('OK = Replace all data\nCancel = Merge (add new sessions only)');
      if (replace) {
        sessions = data.sessions || [];
        if (data.settings) settings = { ...defaultSettings(), ...data.settings };
        if (data.skills) skills = data.skills;
        saveSessions(); saveSettings(); saveSkills(skills);
        applyDarkMode();
        toast('Import complete — all data replaced');
      } else {
        // Merge: add sessions not already present by ID
        const existingIds = new Set(sessions.map(s => s.id));
        let added = 0;
        for (const s of (data.sessions || [])) {
          if (!existingIds.has(s.id)) { sessions.push(s); added++; }
        }
        if (data.skills) {
          skills = { ...data.skills, ...skills }; // existing values win
          saveSkills(skills);
        }
        saveSessions();
        toast(`Merged: ${added} new session(s) added`);
      }
      if (currentView === 'dashboard') renderDashboard();
      else if (currentView === 'history') renderHistory();
      else if (currentView === 'settings') renderSettings();
    } catch { toast('Could not parse file'); }
  };
  reader.readAsText(file);
  input.value = '';
}

function download(filename, content, mime) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([content], { type: mime }));
  a.download = filename;
  a.click();
  URL.revokeObjectURL(a.href);
}

// ═══════════════════════════════════════════════════════
// WEATHER & GEOCODING
// ═══════════════════════════════════════════════════════
async function fetchWeather(lat, lng) {
  try {
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lng}&current=temperature_2m,weather_code,wind_speed_10m,is_day&temperature_unit=fahrenheit&wind_speed_unit=mph`;
    const r = await fetch(url);
    const d = await r.json();
    const c = d.current;
    return {
      temp: Math.round(c.temperature_2m),
      code: c.weather_code,
      windSpeed: Math.round(c.wind_speed_10m),
      isDay: c.is_day === 1
    };
  } catch { return null; }
}

async function reverseGeocode(lat, lng) {
  try {
    const url = `https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json`;
    const r = await fetch(url, { headers: { 'Accept-Language': 'en' } });
    const d = await r.json();
    const city = d.address?.city || d.address?.town || d.address?.village || d.address?.county || '';
    const state = d.address?.state || '';
    const road = d.address?.road || '';
    return {
      lat, lng,
      city: city ? `${city}, ${state}` : state,
      address: road ? `${road}, ${city ? city + ', ' : ''}${state}` : d.display_name?.split(',').slice(0,3).join(',').trim() || `${lat.toFixed(4)}, ${lng.toFixed(4)}`
    };
  } catch {
    return { lat, lng, city: '', address: `${lat.toFixed(4)}, ${lng.toFixed(4)}` };
  }
}

function openManualModal(editId = null) {
  editingSessionId = editId;
  const pad = n => String(n).padStart(2,'0');

  if (editId) {
    const s = sessions.find(x => x.id === editId);
    if (!s) return;
    const start = new Date(s.startTime);
    const end = s.endTime ? new Date(s.endTime) : null;
    document.getElementById('manual-modal-title').textContent = 'Edit Drive';
    document.getElementById('m-date').value = `${start.getFullYear()}-${pad(start.getMonth()+1)}-${pad(start.getDate())}`;
    document.getElementById('m-start').value = `${pad(start.getHours())}:${pad(start.getMinutes())}`;
    document.getElementById('m-end').value = end ? `${pad(end.getHours())}:${pad(end.getMinutes())}` : '';
    document.getElementById('m-dur-h').value = '';
    document.getElementById('m-dur-m').value = '';
    document.getElementById('m-daynight').value = s.isNight ? 'night' : 'day';
    document.getElementById('m-supervisor').value = s.supervisorName || '';
    document.getElementById('m-supervisor-lic').value = s.supervisorLic || '';
    document.getElementById('m-location').value = s.startLocation?.city || s.startLocation?.address || '';
    document.getElementById('m-notes').value = s.notes || '';
  } else {
    const now = new Date();
    document.getElementById('manual-modal-title').textContent = 'Add Drive Manually';
    document.getElementById('m-date').value = `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}`;
    document.getElementById('m-start').value = `${pad(now.getHours())}:${pad(now.getMinutes())}`;
    document.getElementById('m-end').value = '';
    document.getElementById('m-dur-h').value = '';
    document.getElementById('m-dur-m').value = '';
    document.getElementById('m-daynight').value = isNightByTime(now) ? 'night' : 'day';
    document.getElementById('m-supervisor').value = '';
    document.getElementById('m-supervisor-lic').value = '';
    document.getElementById('m-location').value = '';
    document.getElementById('m-notes').value = '';
  }

  document.getElementById('manual-modal').classList.add('open');
}

function closeManualModal() {
  editingSessionId = null;
  document.getElementById('manual-modal').classList.remove('open');
}

document.getElementById('manual-modal').addEventListener('click', e => {
  if (e.target === document.getElementById('manual-modal')) closeManualModal();
});

function saveManualDrive() {
  const dateVal = document.getElementById('m-date').value;
  const startVal = document.getElementById('m-start').value;
  const endVal = document.getElementById('m-end').value;
  const durH = parseFloat(document.getElementById('m-dur-h').value) || 0;
  const durM = parseFloat(document.getElementById('m-dur-m').value) || 0;
  const isNight = document.getElementById('m-daynight').value === 'night';
  const supervisorName = document.getElementById('m-supervisor').value.trim();
  const supervisorLic = document.getElementById('m-supervisor-lic').value.trim();
  const location = document.getElementById('m-location').value.trim();
  const notes = document.getElementById('m-notes').value.trim();

  if (!dateVal) { toast('Please enter a date'); return; }
  if (!startVal && durH === 0 && durM === 0) { toast('Please enter a start time or duration'); return; }

  let startTime, duration;

  if (startVal) {
    startTime = new Date(`${dateVal}T${startVal}`).toISOString();
    if (endVal) {
      let start = new Date(`${dateVal}T${startVal}`);
      let end = new Date(`${dateVal}T${endVal}`);
      if (end <= start) end.setDate(end.getDate() + 1);
      duration = (end - start) / 60000;
    } else if (durH > 0 || durM > 0) {
      duration = durH * 60 + durM;
    } else {
      toast('Please enter an end time or duration'); return;
    }
  } else {
    startTime = new Date(`${dateVal}T00:00`).toISOString();
    duration = durH * 60 + durM;
  }

  if (duration <= 0) { toast('Duration must be greater than zero'); return; }

  const endTime = new Date(new Date(startTime).getTime() + duration * 60000).toISOString();

  if (editingSessionId) {
    const idx = sessions.findIndex(x => x.id === editingSessionId);
    if (idx !== -1) {
      const existing = sessions[idx];
      sessions[idx] = {
        ...existing,
        startTime,
        endTime,
        duration,
        isNight,
        supervisorName,
        supervisorLic,
        startLocation: location ? { lat: existing.startLocation?.lat || null, lng: existing.startLocation?.lng || null, city: location, address: location } : existing.startLocation,
        notes,
      };
    }
    saveSessions();
    checkMilestones();
    closeManualModal();
    toast('Drive updated');
  } else {
    const session = {
      id: genId(),
      startTime,
      endTime,
      duration,
      isNight,
      supervisorName,
      supervisorLic,
      startLocation: location ? { lat: null, lng: null, city: location, address: location } : null,
      endLocation: null,
      weather: null,
      route: [],
      distance: 0,
      maxSpeedMph: 0,
      avgSpeedMph: 0,
      notes,
      manual: true
    };
    sessions.push(session);
    saveSessions();
    checkMilestones();
    closeManualModal();
    toast('Drive added');
  }
  if (currentView === 'history') renderHistory();
  else if (currentView === 'dashboard') renderDashboard();
  else if (currentView === 'drive') renderDrive();
}

// ═══════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════
function haversineMeters(lat1, lng1, lat2, lng2) {
  const R = 6371000, toRad = x => x * Math.PI / 180;
  const dLat = toRad(lat2-lat1), dLng = toRad(lng2-lng1);
  const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function routeDistMiles(route) {
  let d = 0;
  for (let i = 1; i < route.length; i++) d += haversineMeters(route[i-1][0], route[i-1][1], route[i][0], route[i][1]);
  return d / 1609.344;
}

function elapsedMin(startTime) {
  return (Date.now() - new Date(startTime).getTime()) / 60000;
}

function fmtElapsed(startTime) {
  const s = Math.floor((Date.now() - new Date(startTime).getTime()) / 1000);
  const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60), sec = s % 60;
  return `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}`;
}

function fmtDur(minutes) {
  if (!minutes) return '0m';
  const h = Math.floor(minutes / 60), m = Math.round(minutes % 60);
  if (h === 0) return `${m}m`;
  if (m === 0) return `${h}h`;
  return `${h}h ${m}m`;
}

function fmtTime(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
}

function fmtDate(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleDateString([], { weekday: 'short', month: 'short', day: 'numeric' });
}

function isNightByTime(date) {
  const h = date.getHours();
  return h < 6 || h >= 20;
}

let toastTimer = null;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2800);
}
